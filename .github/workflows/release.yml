name: Release (Windows + macOS)

# Build and publish BOTH the Windows and macOS desktop apps for every version
# tag, so the auto-updater always has an up-to-date build for both platforms.
#
# To cut a release:
#   1. Bump "version" in desktop/package.json (and web APP_INFO for the About page)
#   2. git commit -am "Release vX.Y.Z"
#   3. git tag vX.Y.Z && git push origin main --tags
# This workflow then builds on windows-latest + macos-latest and uploads the
# installers plus latest.yml / latest-mac.yml to the GitHub release for the tag.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write # required so electron-builder can publish the release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build: npm run -w desktop dist -- --publish always
          - os: macos-latest
            build: npm run -w desktop dist:mac -- --publish always
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client + engine
        run: npx prisma generate --schema server/prisma/schema.prisma
        env:
          DATABASE_URL: "file:./build.db" # generate doesn't connect; just needs a value

      - name: Build web UI
        run: npm run -w web build

      - name: Build & publish desktop app
        run: ${{ matrix.build }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Build unsigned by default (no certs in CI). To ship a signed +
          # notarized macOS app so it launches without Gatekeeper warnings AND
          # can auto-update, add these repo secrets (Apple Developer ID) and set
          # "notarize": true under "mac" in desktop/package.json:
          #   MAC_CSC_LINK              base64 of your Developer ID .p12
          #   MAC_CSC_KEY_PASSWORD      the .p12 password
          #   APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID
          # These are scoped to the macOS runner so they never touch the Windows build.
          CSC_LINK: ${{ runner.os == 'macOS' && secrets.MAC_CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ runner.os == 'macOS' && secrets.MAC_CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Unsigned unless MAC_CSC_LINK is provided (electron-builder uses CSC_LINK when set).
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
