name: Release (Windows + macOS)

# Build and publish BOTH the Windows and macOS desktop apps for every version
# tag, so the auto-updater always has an up-to-date build for both platforms.
#
# To cut a release:
#   1. Bump "version" in desktop/package.json (and web APP_INFO for the About page)
#   2. git commit -am "Release vX.Y.Z"
#   3. git tag vX.Y.Z && git push origin main --tags
# This workflow then builds on windows-latest + macos-latest and uploads the
# installers plus latest.yml / latest-mac.yml to the GitHub release for the tag.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write # required so electron-builder can publish the release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build: npm run -w desktop dist -- --publish always
          - os: macos-latest
            build: npm run -w desktop dist:mac -- --publish always
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client + engine
        run: npx prisma generate --schema server/prisma/schema.prisma
        env:
          DATABASE_URL: "file:./build.db" # generate doesn't connect; just needs a value

      - name: Build web UI
        run: npm run -w web build

      # Configure macOS signing ONLY when a certificate secret is actually set.
      # (An EMPTY CSC_LINK makes electron-builder treat it as a bad cert path and
      # fail with "<dir> not a file", so we must leave it unset for unsigned builds.)
      # To ship a signed + notarized, auto-updatable macOS app: add the repo
      # secrets below and set "notarize": true under "mac" in desktop/package.json.
      - name: Configure macOS signing (only if a cert secret is present)
        if: runner.os == 'macOS'
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$MAC_CSC_LINK" ]; then
            {
              echo "CSC_LINK=$MAC_CSC_LINK"
              echo "CSC_KEY_PASSWORD=$MAC_CSC_KEY_PASSWORD"
              echo "APPLE_ID=$APPLE_ID"
              echo "APPLE_APP_SPECIFIC_PASSWORD=$APPLE_APP_SPECIFIC_PASSWORD"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
            } >> "$GITHUB_ENV"
            echo "macOS signing configured from secrets."
          else
            echo "No MAC_CSC_LINK secret set — building an unsigned macOS app."
          fi

      - name: Build & publish desktop app
        run: ${{ matrix.build }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned unless the signing step above exported CSC_LINK from a secret.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
