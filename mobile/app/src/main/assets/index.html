<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>eSign MICO360</title>
<style>
  :root{--primary:#8a1a1c;--primary-dark:#6e1416;--ink:#1e1f1e;--muted:#8a8c8a;--bg:#f5f3f2;--border:#e3e0de;--success:#2e7d32;--danger:#b3261e;--warning:#c77700;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:'Segoe UI',Roboto,system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;}
  .topbar{background:var(--ink);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;padding-top:calc(14px + env(safe-area-inset-top));}
  .topbar img{height:26px;}
  .topbar .right{display:flex;gap:8px;align-items:center;font-size:13px;}
  .content{padding:14px;}
  .btn{display:block;width:100%;padding:13px;border:none;border-radius:9px;font-size:15px;font-weight:600;background:var(--primary);color:#fff;cursor:pointer;margin-top:8px;}
  .btn:active{background:var(--primary-dark);}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--border);}
  .btn.success{background:var(--success);} .btn.danger{background:var(--danger);}
  .btn.half{display:inline-block;width:48%;}
  input,textarea,select{width:100%;padding:12px;border:1px solid var(--border);border-radius:9px;font-size:15px;margin-top:6px;background:#fff;}
  label{font-size:13px;font-weight:600;color:#555;display:block;margin-top:12px;}
  .card{background:#fff;border:1px solid var(--border);border-radius:11px;padding:14px;margin-bottom:10px;}
  .card h3{margin:0 0 4px;font-size:16px;}
  .muted{color:var(--muted);font-size:13px;}
  .badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700;color:#fff;}
  .tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:54px;z-index:9;}
  .tabs button{flex:1;padding:12px;border:none;background:none;font-weight:600;color:var(--muted);border-bottom:3px solid transparent;}
  .tabs button.active{color:var(--primary);border-bottom-color:var(--primary);}
  .login{padding:24px 18px;max-width:420px;margin:0 auto;}
  .login img{display:block;height:46px;margin:30px auto 18px;}
  .hidden{display:none;}
  .steps{list-style:none;padding:0;margin:8px 0;}
  .steps li{padding:6px 0;border-bottom:1px solid var(--border);font-size:14px;}
  .err{color:var(--danger);font-size:13px;margin-top:8px;}
  .sheet{position:fixed;inset:0;background:#fff;z-index:20;overflow:auto;}
  .sheet .hd{position:sticky;top:0;background:var(--ink);color:#fff;padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));display:flex;align-items:center;gap:10px;}
  .link{color:var(--primary);font-weight:600;text-decoration:none;}
  .center{text-align:center;padding:30px;color:var(--muted);}
</style>
</head>
<body>
<div id="app"></div>

<script>
const S = { base: localStorage.getItem('serverUrl')||'', token: localStorage.getItem('token')||'', me:null, tab:'pending' };
const $ = (h)=>{const d=document.createElement('div');d.innerHTML=h;return d.firstElementChild;};
const app = document.getElementById('app');
const STATUS_COLORS={DRAFT:'#8a8c8a',UPLOADED:'#1565c0',PDF_CONVERTED:'#1565c0',PENDING_APPROVAL:'#c77700',PENDING_SIGNATURE:'#c77700',PARTIALLY_APPROVED:'#b33235',APPROVED:'#2e7d32',REJECTED:'#b3261e',COMPLETED:'#2e7d32',CANCELLED:'#8a8c8a'};
const badge=(s)=>`<span class="badge" style="background:${STATUS_COLORS[s]||'#8a8c8a'}">${(s||'').replace(/_/g,' ')}</span>`;

async function api(path, opts={}){
  const headers = Object.assign({'Content-Type':'application/json'}, opts.headers||{});
  if(S.token) headers.Authorization = 'Bearer '+S.token;
  const res = await fetch(S.base.replace(/\/$/,'') + '/api' + path, Object.assign({}, opts, {headers}));
  const text = await res.text(); let data; try{data=JSON.parse(text)}catch{data=text}
  if(!res.ok) throw new Error((data&&data.error)||('HTTP '+res.status));
  return data.data!==undefined?data.data:data;
}

function render(){
  if(!S.base){ return renderServer(); }
  if(!S.token||!S.me){ return renderLogin(); }
  return renderHome();
}

function renderServer(){
  app.innerHTML='';
  const v = $(`<div class="login">
    <img src="logo.png"/>
    <h2 style="text-align:center">Connect to server</h2>
    <p class="muted" style="text-align:center">Enter your eSign MICO360 server address.</p>
    <label>Server URL</label>
    <input id="url" placeholder="http://192.168.1.10:4400" value="${S.base||''}"/>
    <button class="btn" id="save">Continue</button>
    <p class="muted" style="margin-top:14px;font-size:12px">Tip: use your computer's LAN IP and the API port (default 4400). The backend must be running.</p>
  </div>`);
  app.appendChild(v);
  v.querySelector('#save').onclick=()=>{ const u=v.querySelector('#url').value.trim(); if(!u)return; S.base=u; localStorage.setItem('serverUrl',u); render(); };
}

function renderLogin(){
  app.innerHTML='';
  const v=$(`<div class="login">
    <img src="logo.png"/>
    <h2 style="text-align:center">Sign in</h2>
    <label>Email</label><input id="email" value="approver@mico360.com"/>
    <label>Password</label><input id="pw" type="password" placeholder="User@123"/>
    <div class="err hidden" id="err"></div>
    <button class="btn" id="go">Sign in</button>
    <button class="btn ghost" id="chg">Change server (${S.base})</button>
  </div>`);
  app.appendChild(v);
  v.querySelector('#chg').onclick=()=>{ S.base=''; localStorage.removeItem('serverUrl'); render(); };
  v.querySelector('#go').onclick=async()=>{
    const err=v.querySelector('#err'); err.classList.add('hidden');
    try{
      const r=await api('/auth/login',{method:'POST',body:JSON.stringify({email:v.querySelector('#email').value,password:v.querySelector('#pw').value})});
      S.token=r.token; localStorage.setItem('token',r.token);
      S.me=await api('/auth/me'); render();
    }catch(e){ err.textContent=e.message; err.classList.remove('hidden'); }
  };
}

async function ensureMe(){ if(!S.me){ try{S.me=await api('/auth/me')}catch{ logout(); } } }
function logout(){ S.token=''; S.me=null; localStorage.removeItem('token'); render(); }

async function renderHome(){
  app.innerHTML='';
  app.appendChild($(`<div class="topbar"><img src="logo-w.png"/><div class="right"><span>${S.me.fullName.split(' ')[0]}</span><a class="link" style="color:#fff" id="out">Sign out</a></div></div>`));
  app.appendChild($(`<div class="tabs">
    <button data-t="pending" class="${S.tab==='pending'?'active':''}">Pending</button>
    <button data-t="recent" class="${S.tab==='recent'?'active':''}">Recent</button>
    <button data-t="me" class="${S.tab==='me'?'active':''}">Me</button>
  </div>`));
  const body=$(`<div class="content" id="body"><div class="center">Loading…</div></div>`);
  app.appendChild(body);
  document.getElementById('out').onclick=logout;
  app.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{S.tab=b.dataset.t;renderHome();});
  if(S.tab==='pending') loadPending(body);
  else if(S.tab==='recent') loadRecent(body);
  else loadMe(body);
}

async function loadPending(body){
  try{
    const docs=await api('/documents/pending');
    body.innerHTML = docs.length? '' : '<div class="center">No documents awaiting your approval. 🎉</div>';
    docs.forEach(d=>{ const c=$(`<div class="card"><h3>${d.title}</h3><div class="muted">${d.profile?.name||''} · by ${d.uploadedBy?.fullName||''}</div><div style="margin-top:8px">${badge(d.status)}</div></div>`); c.onclick=()=>openDoc(d.id); body.appendChild(c); });
  }catch(e){ body.innerHTML=`<div class="err">${e.message}</div>`; }
}
async function loadRecent(body){
  try{
    const docs=await api('/documents');
    body.innerHTML = docs.length?'':'<div class="center">No documents.</div>';
    docs.slice(0,40).forEach(d=>{ const c=$(`<div class="card"><h3>${d.title}</h3><div class="muted">${d.profile?.name||''}</div><div style="margin-top:8px">${badge(d.status)}</div></div>`); c.onclick=()=>openDoc(d.id); body.appendChild(c); });
  }catch(e){ body.innerHTML=`<div class="err">${e.message}</div>`; }
}
async function loadMe(body){
  try{
    const r=await api('/reports/me');
    body.innerHTML=`<div class="card"><h3>${S.me.fullName}</h3><div class="muted">${S.me.role||''} · ${S.me.email}</div>
      <div class="muted" style="margin-top:8px">Profiles: ${(S.me.profiles||[]).map(p=>p.name).join(', ')||'—'}</div></div>
      <div class="card"><h3>My activity</h3>
      <div>Uploaded by me: <b>${r.uploaded}</b></div>
      <div>Pending my approval: <b>${r.pendingMyApproval}</b></div>
      <div>Signed by me: <b>${r.signedByMe}</b></div>
      <div>Rejected by me: <b>${r.rejectedByMe}</b></div>
      <div>Completed: <b>${r.completed}</b></div></div>`;
  }catch(e){ body.innerHTML=`<div class="err">${e.message}</div>`; }
}

async function openDoc(id){
  const sheet=$(`<div class="sheet"><div class="hd"><a class="link" style="color:#fff" id="bk">‹ Back</a><b>Document</b></div><div class="content" id="dc"><div class="center">Loading…</div></div></div>`);
  document.body.appendChild(sheet);
  sheet.querySelector('#bk').onclick=()=>sheet.remove();
  const dc=sheet.querySelector('#dc');
  try{
    const d=await api('/documents/'+id);
    const myStep=(d.steps||[]).find(s=>s.signatory.id===S.me.id);
    const canDecide=myStep&&myStep.status==='PENDING'&&['PENDING_APPROVAL','PARTIALLY_APPROVED'].includes(d.status);
    const pdfUrl=S.base.replace(/\/$/,'')+'/api/documents/'+id+'/view/'+(d.status==='COMPLETED'?'final':'converted')+'?token='+encodeURIComponent(S.token);
    dc.innerHTML=`<div class="card"><h3>${d.title}</h3><div class="muted">${d.profile?.name||''} · by ${d.uploadedBy?.fullName||''}</div><div style="margin-top:8px">${badge(d.status)}</div>
      ${d.description?`<p>${d.description}</p>`:''}
      <a class="btn ghost" style="text-align:center;text-decoration:none;display:block" href="${pdfUrl}" target="_blank">📄 Open PDF</a></div>
      <div class="card"><h3>Approval (${d.approvalMode})</h3><ul class="steps">${(d.steps||[]).map(s=>`<li><b>${s.signatory.fullName}</b> — ${badge(s.status)}${s.comment?`<div class="muted">"${s.comment}"</div>`:''}</li>`).join('')||'<span class="muted">Not submitted</span>'}</ul></div>
      <div class="card"><h3>History</h3><ul class="steps">${(d.events||[]).map(e=>`<li><b>${e.action.replace(/_/g,' ')}</b> ${e.detail?'<span class="muted">— '+e.detail+'</span>':''}</li>`).join('')}</ul></div>
      <div id="actions"></div>`;
    if(canDecide){
      const a=sheet.querySelector('#actions');
      a.innerHTML=`<div class="card"><label>Comment (optional)</label><textarea id="cm" rows="2"></textarea>
        <div style="display:flex;justify-content:space-between;margin-top:10px"><button class="btn success half" id="ap">✓ Approve</button><button class="btn danger half" id="rj">✕ Reject</button></div>
        <div class="err hidden" id="ae"></div></div>`;
      const decide=async(decision)=>{
        const ae=a.querySelector('#ae'); ae.classList.add('hidden');
        try{ await api('/documents/'+id+'/decision',{method:'POST',body:JSON.stringify({decision,comment:a.querySelector('#cm').value})});
          sheet.remove(); renderHome();
        }catch(e){ ae.textContent=e.message; ae.classList.remove('hidden'); }
      };
      a.querySelector('#ap').onclick=()=>decide('APPROVE');
      a.querySelector('#rj').onclick=()=>decide('REJECT');
    }
  }catch(e){ dc.innerHTML=`<div class="err">${e.message}</div>`; }
}

(async()=>{ if(S.base&&S.token){ await ensureMe(); } render(); })();
</script>
</body>
</html>
